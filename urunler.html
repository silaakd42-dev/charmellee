<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHARMELLEE - Ürün Kataloğu</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #fafafa;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 5px;
        }

        .geri-buton {
            display: inline-block;
            padding: 10px 20px;
            background-color: #000;
            color: #fff;
            text-decoration: none;
            border-radius: 25px;
            margin-bottom: 30px;
            font-size: 14px;
            transition: 0.3s;
        }

        .geri-buton:hover {
            background-color: #444;
        }

        /* Ürünlerin yan yana 3'erli dizilmesini sağlayan ızgara sistemi */
        .katalog-konteyner {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Yan yana tam 3 eşit sütun */
            gap: 20px; /* Ürün kartları arasındaki boşluk */
            max-width: 1000px;
            margin: 0 auto;
            padding: 10px;
        }

        /* Telefon ekranlarında düzgün görünmesi için (2'li veya tekli sıra) */
        @media (max-width: 768px) {
            .katalog-konteyner {
                grid-template-columns: repeat(2, 1fr); /* Tabletlerde yan yana 2 tane */
            }
        }
        @media (max-width: 480px) {
            .katalog-konteyner {
                grid-template-columns: repeat(1, 1fr); /* Telefonlarda alt alta sığsın */
            }
        }

        /* Her bir ürün kartının şık tasarımı */
        .urun-kart {
            background-color: #fff;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            border: 1px solid #eee;
        }

        .urun-kart:hover {
            transform: translateY(-5px); /* Fareyle üzerine gelince hafif yukarı kalkar */
        }

        /* Fotoğrafların kare kalması ve taşmaması için ayar */
        .urun-kart img {
            width: 100%;
            height: 250px; /* Sabit yükseklik ile fotoğrafları eşitler */
            object-fit: cover; /* Fotoğrafı kırpmadan en şık şekilde kutuya sığdırır */
            border-radius: 8px;
            cursor: pointer; /* Üzerine gelince tıklanabilir el işareti çıkar */
        }

        .urun-kart p {
            font-size: 16px;
            font-weight: bold;
            color: #444;
            margin-top: 12px;
            margin-bottom: 0;
        }

        /* ---- TIKLAYINCA AÇILAN BÜYÜK MODAL EKRANI STİLİ ---- */
        .resim-modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            padding-top: 60px; 
            left: 0; top: 0;
            width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.85); /* Arkadaki koyu şeffaf fon */
        }

        .modal-icerik {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 80vh;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(255,255,255,0.1);
        }

        .kapat-butonu {
            position: absolute;
            top: 20px; right: 35px;
            color: #fff;
            font-size: 45px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .kapat-butonu:hover {
            color: #bbb;
        }
    </style>
</head>
<body>

    <h1>Anahtarlık Kataloğu</h1>
    <a href="index.html" class="geri-buton">⬅ Ana Menüye Dön</a>

    <div class="katalog-konteyner">

        <div class="urun-kart">
            <img src="Web_Photo_Editor (1).jpg" onclick="buyutResim(this)" alt="Civciv Model 1">
            <p>Civciv Model 1 - 150 TL</p>
        </div>

        <div class="urun-kart">
            <img src="Web_Photo_Editor (2).jpg" onclick="buyutResim(this)" alt="Civciv Model 2">
            <p>Civciv Model 2 - 150 TL</p>
        </div>

        <div class="urun-kart">
            <img src="Web_Photo_Editor (3).jpg" onclick="buyutResim(this)" alt="Civciv Model 3">
            <p>Civciv Model 3 - 150 TL</p>
        </div>

        <div class="urun-kart">
            <img src="Web_Photo_Editor (4).jpg" onclick="buyutResim(this)" alt="Model 4">
            <p>Model 4 - 150 TL</p>
        </div>

        <div class="urun-kart">
            <img src="Web_Photo_Editor (5).jpg" onclick="buyutResim(this)" alt="Model 5">
            <p>Model 5 - 150 TL</p>
        </div>

        <div class="urun-kart">
            <img src="Web_Photo_Editor (6).jpg" onclick="buyutResim(this)" alt="Model 6">
            <p>Model 6 - 150 TL</p>
        </div>

    </div>

    <div id="myModal" class="resim-modal" onclick="this.style.display='none'">
        <span class="kapat-butonu">&times;</span>
        <img class="modal-icerik" id="img01">
    </div>

    <script>
        function buyutResim(element) {
            var modal = document.getElementById("myModal");
            var modalImg = document.getElementById("img01");
            modal.style.display = "block";
            modalImg.src = element.src;
        }
    </script>

</body>
</html>
